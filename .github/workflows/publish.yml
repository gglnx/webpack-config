name: Publish to npm

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'gglnx/webpack-config' }}
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.value }}
      npm_tag: ${{ steps.npm_tag.outputs.value }}
      latest_release: ${{ steps.latest_release.outputs.value }}
    steps:
      - uses: actions/checkout@v7
      - id: version
        run: echo "value=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"
      - id: npm_tag
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          case "$VERSION" in
            *-*) echo "value=next" >> "$GITHUB_OUTPUT" ;;
            *)   echo "value=latest" >> "$GITHUB_OUTPUT" ;;
          esac
      - id: latest_release
        env:
          GH_TOKEN: ${{ github.token }}
          NPM_TAG: ${{ steps.npm_tag.outputs.value }}
        run: |
          if [ "$NPM_TAG" = "next" ]; then
            # Pre-releases count too: most recent published release of any kind.
            release=$(gh release list --limit 1 --exclude-drafts --json name --jq '.[0].name // ""')
          else
            # Only stable releases are relevant for the "latest" tag.
            release=$(gh release list --limit 1 --exclude-drafts --exclude-pre-releases --json name --jq '.[0].name // ""')
          fi
          echo "value=$release" >> "$GITHUB_OUTPUT"

  release:
    needs: preflight
    runs-on: ubuntu-latest
    if: ${{ needs.preflight.outputs.version != needs.preflight.outputs.latest_release }}
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm test
      - run: npm run build
      - uses: release-drafter/release-drafter@v6
        with:
          version: ${{ needs.preflight.outputs.version }}
          publish: true
          prerelease: ${{ needs.preflight.outputs.npm_tag == 'next' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
      - env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TAG: ${{ needs.preflight.outputs.npm_tag }}
        run: npm publish --tag "$NPM_TAG" --provenance --access public
