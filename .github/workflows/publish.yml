name: Publish to npm

on:
  push:
    branches:
      - main
      - v.+

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'gglnx/webpack-config' }}
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.value }}
      npm_tag: ${{ steps.npm_tag.outputs.value }}
      latest_release: ${{ steps.latest_release.outputs.value }}
    steps:
      - uses: actions/checkout@v7
      - id: version
        run: echo "value=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"
      - id: npm_tag
        run: |
          case "$VERSION" in
            *-*) echo "value=next" >> "$GITHUB_OUTPUT" ;;
            *)   echo "value=latest" >> "$GITHUB_OUTPUT" ;;
          esac
        env:
          VERSION: ${{ steps.version.outputs.value }}
      - id: latest_release
        run: |
          major="${VERSION%%.*}"
          filter="map(select(.name | startswith(\"${major}.\"))) | .[0].name // \"\""

          if [ "$NPM_TAG" = "next" ]; then
            release=$(gh release list --limit 100 --exclude-drafts --json name --jq "$filter")
          else
            release=$(gh release list --limit 100 --exclude-drafts --exclude-pre-releases --json name --jq "$filter")
          fi
          echo "value=$release" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}
          NPM_TAG: ${{ steps.npm_tag.outputs.value }}
          VERSION: ${{ steps.version.outputs.value }}

  release:
    needs: preflight
    runs-on: ubuntu-latest
    if: ${{ needs.preflight.outputs.version != needs.preflight.outputs.latest_release }}
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build
      - run: |
          args=(--title "$VERSION" --target "$GITHUB_SHA")
          if [ "$NPM_TAG" = "next" ]; then
            args+=(--prerelease)
          fi

          notes=$(awk -v ver="$VERSION" '
            /^##[[:space:]]/ {
              if (found) exit
              if ($0 ~ ("\\[" ver "\\]") || $0 == ("## " ver)) { found=1; next }
            }
            found { print }
          ' CHANGELOG.md 2>/dev/null || true)

          if printf '%s' "$notes" | grep -q '[^[:space:]]'; then
            printf '%s\n' "$notes" > release-notes.md
            args+=(--notes-file release-notes.md)
          else
            args+=(--generate-notes)
          fi

          gh release create "$VERSION" "${args[@]}"
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.preflight.outputs.version }}
          NPM_TAG: ${{ needs.preflight.outputs.npm_tag }}
      - run: npm publish --tag "$NPM_TAG" --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TAG: ${{ needs.preflight.outputs.npm_tag }}
